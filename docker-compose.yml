services:
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000/api/v1
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend